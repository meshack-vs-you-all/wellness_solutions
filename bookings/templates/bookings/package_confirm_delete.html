{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-lg mx-auto bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold mb-6">{% trans "Delete Package" %}</h1>
        
        <p class="mb-4">{% trans "Are you sure you want to delete this package?" %}</p>
        <p class="mb-6 font-semibold">{{ object.name }}</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="flex justify-end space-x-4">
                <a href="{% url 'bookings:package-list' %}" 
                   class="px-4 py-2 bg-gray-300 text-gray-700 rounded hover:bg-gray-400">
                    {% trans "Cancel" %}
                </a>
                <button type="submit" 
                        class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">
                    {% trans "Delete" %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
