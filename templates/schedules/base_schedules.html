{% extends "base.html" %}

{% block title %}Schedule Management{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row">
    <div class="col-md-3">
      <div class="list-group mb-4">
        <a href="{% url 'schedules:schedule-list' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'schedule-list' %}active{% endif %}">
          Regular Schedules
        </a>
        <a href="{% url 'schedules:timeslot-list' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'timeslot-list' %}active{% endif %}">
          Time Slots
        </a>
        <a href="{% url 'schedules:blackoutdate-list' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'blackoutdate-list' %}active{% endif %}">
          Blackout Dates
        </a>
      </div>
    </div>
    <div class="col-md-9">
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
      
      {% block schedule_content %}{% endblock %}
    </div>
  </div>
</div>
{% endblock content %}
