{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-lg mx-auto bg-white rounded-lg shadow-md p-6">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">{% trans "Delete Blackout Date" %}</h2>
        
        <p class="mb-4 text-gray-700">
            {% blocktrans %}
            Are you sure you want to delete this blackout date? This action cannot be undone.
            {% endblocktrans %}
        </p>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div class="flex justify-end space-x-4">
                <a href="{% url 'schedules:schedule-detail' object.schedule.id %}" 
                   class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 transition-colors">
                    {% trans "Cancel" %}
                </a>
                <button type="submit" 
                        class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition-colors">
                    {% trans "Delete" %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
