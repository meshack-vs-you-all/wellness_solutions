{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Email Preferences{% endblock %}

{% block content %}
<div class="min-h-full bg-gray-100 py-6">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <!-- Header -->
    <div class="md:flex md:items-center md:justify-between">
      <div class="min-w-0 flex-1">
        <h2 class="text-2xl font-bold leading-7 text-gray-900 sm:truncate sm:text-3xl sm:tracking-tight">Email Preferences</h2>
      </div>
    </div>

    <!-- Main content -->
    <div class="mt-8">
      <div class="overflow-hidden bg-white shadow sm:rounded-lg">
        <div class="px-4 py-5 sm:p-6">
          <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="mt-6 flex items-center justify-end gap-x-6">
              <a href="{% url 'users:instructor_dashboard' %}" class="text-sm font-semibold leading-6 text-gray-900">Cancel</a>
              <button type="submit" class="inline-flex justify-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Save Changes</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
