<!-- Active Packages -->
<div class="bg-white shadow rounded-lg">
    <div class="px-4 py-5 sm:p-6">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg leading-6 font-medium text-gray-900">Active Packages</h3>
            <a href="{% url 'packages:package-list' %}" class="text-sm font-medium text-blue-600 hover:text-blue-900">View all packages</a>
        </div>
        <div class="flow-root">
            <ul role="list" class="-my-5 divide-y divide-gray-200">
                {% for package in active_packages %}
                <li class="py-4">
                    <div class="flex items-center space-x-4">
                        <div class="flex-shrink-0">
                            <svg class="h-8 w-8 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                      d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                            </svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-900 truncate">
                                {{ package.name }}
                            </p>
                            <p class="text-sm text-gray-500">
                                {{ package.sessions_remaining }} sessions remaining
                            </p>
                        </div>
                        <div>
                            <div class="inline-flex items-center shadow-sm px-2.5 py-0.5 border border-gray-300 text-sm leading-5 font-medium rounded-full text-gray-700 bg-white hover:bg-gray-50">
                                Valid until {{ package.expiry_date|date:"M d, Y" }}
                            </div>
                        </div>
                    </div>
                </li>
                {% empty %}
                <li class="py-4">
                    <div class="text-center text-sm text-gray-500">
                        No active packages
                    </div>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>
