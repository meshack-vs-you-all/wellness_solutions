<!-- Client List -->
<div class="bg-white shadow rounded-lg">
    <div class="px-4 py-5 sm:p-6">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg leading-6 font-medium text-gray-900">Recent Clients</h3>
            <a href="{% url 'bookings:instructor-clients' %}" class="text-sm font-medium text-blue-600 hover:text-blue-900">View all clients</a>
        </div>
        <div class="flow-root">
            <ul role="list" class="-my-5 divide-y divide-gray-200">
                {% for client in recent_clients %}
                <li class="py-4">
                    <div class="flex items-center space-x-4">
                        <div class="flex-shrink-0">
                            <img class="h-8 w-8 rounded-full" src="{{ client.avatar.url|default:'/static/images/default-avatar.png' }}" alt="">
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-900 truncate">
                                {{ client.get_full_name }}
                            </p>
                            <p class="text-sm text-gray-500">
                                Last session: {{ client.last_session|naturalday }}
                            </p>
                        </div>
                        <div>
                            <a href="{% url 'bookings:instructor-client-detail' client.id %}" 
                               class="inline-flex items-center shadow-sm px-2.5 py-0.5 border border-gray-300 text-sm leading-5 font-medium rounded-full text-gray-700 bg-white hover:bg-gray-50">
                                View Details
                            </a>
                        </div>
                    </div>
                </li>
                {% empty %}
                <li class="py-4">
                    <div class="text-center text-sm text-gray-500">
                        No recent clients
                    </div>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</div>
