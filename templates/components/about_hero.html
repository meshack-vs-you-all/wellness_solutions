{% load static %}

<!-- About Hero Section -->
<div class="relative isolate overflow-hidden">
  <!-- Background image -->
  <div class="absolute inset-0">
    <img src="{% static 'images/about-hero.jpg' %}" alt="About Us Hero" class="h-full w-full object-cover">
    <div class="absolute inset-0 bg-primary/70 mix-blend-multiply"></div>
  </div>
  
  <!-- Content -->
  <div class="relative mx-auto max-w-7xl px-6 py-24 sm:py-32 lg:px-8">
    <div class="mx-auto max-w-2xl text-center">
      <h1 class="text-4xl font-bold tracking-tight text-white sm:text-5xl md:text-6xl">About Us</h1>
      <p class="mt-6 text-xl text-gray-300">
        Dedicated to transforming workplaces through innovative wellness solutions and ergonomic expertise.
      </p>
    </div>
  </div>
</div>
