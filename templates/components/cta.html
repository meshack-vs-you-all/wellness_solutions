{% load static %}

<!-- CTA Section -->
<section class="relative bg-cover bg-center bg-no-repeat py-24" style="background-image: url('{% static 'images/about-hero.jpg' %}');">
    <!-- Gradient Overlay -->
    <div class="absolute inset-0 bg-gradient-to-r from-black/70 to-black/50"></div>

    <!-- Content -->
    <div class="relative max-w-4xl mx-auto text-center px-6 sm:px-8 lg:px-10">
        <!-- Heading -->
        <h2 class="text-5xl font-extrabold text-white leading-tight sm:text-6xl mb-6">
            Ready to Transform Your Workplace?
        </h2>
        <!-- Subtitle -->
        <p class="text-lg sm:text-xl md:text-2xl text-gray-200 leading-relaxed mb-8">
            Experience the transformative power of our comprehensive wellness programs. Schedule a free consultation with our experts today.
        </p>
        <!-- Buttons -->
        <div class="flex flex-wrap justify-center gap-6">
            <a href="{% url 'contact' %}?type=consultation" 
               class="inline-block bg-primary text-white font-semibold text-lg py-3 px-8 rounded-lg shadow-lg hover:bg-white hover:text-black transition duration-300">
                Schedule Consultation
            </a>
            <a href="{% url 'contact' %}" 
               class="inline-block bg-transparent border border-white text-white font-semibold text-lg py-3 px-8 rounded-lg shadow-lg hover:bg-white hover:text-black transition duration-300">
                Contact Us
            </a>
        </div>
    </div>
</section>
