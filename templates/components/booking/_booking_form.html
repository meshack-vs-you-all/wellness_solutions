{% load static %}

<div class="booking-form bg-white shadow rounded-lg p-6"
     x-data="{ 
        step: 1,
        patientInfo: {
            firstName: '',
            lastName: '',
            email: '',
            phone: ''
        },
        referralInfo: {
            category: '',
            reason: ''
        }
     }">
    
    <!-- Progress Steps -->
    <div class="mb-8">
        <div class="flex items-center justify-between">
            <div class="flex items-center">
                <span class="w-8 h-8 flex items-center justify-center rounded-full" 
                      :class="step >= 1 ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-600'">1</span>
                <span class="ml-2 text-sm font-medium" :class="step >= 1 ? 'text-indigo-600' : 'text-gray-500'">Patient Info</span>
            </div>
            <div class="flex-1 h-px mx-4 bg-gray-200"></div>
            <div class="flex items-center">
                <span class="w-8 h-8 flex items-center justify-center rounded-full"
                      :class="step >= 2 ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-600'">2</span>
                <span class="ml-2 text-sm font-medium" :class="step >= 2 ? 'text-indigo-600' : 'text-gray-500'">Referral</span>
            </div>
            <div class="flex-1 h-px mx-4 bg-gray-200"></div>
            <div class="flex items-center">
                <span class="w-8 h-8 flex items-center justify-center rounded-full"
                      :class="step >= 3 ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-600'">3</span>
                <span class="ml-2 text-sm font-medium" :class="step >= 3 ? 'text-indigo-600' : 'text-gray-500'">Confirm</span>
            </div>
        </div>
    </div>

    <!-- Step 1: Patient Information -->
    <div x-show="step === 1">
        <h3 class="text-lg font-medium text-gray-900 mb-6">Patient's Information</h3>
        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="firstName" class="block text-sm font-medium text-gray-700">First Name</label>
                    <input type="text" id="firstName" x-model="patientInfo.firstName"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
                <div>
                    <label for="lastName" class="block text-sm font-medium text-gray-700">Last Name</label>
                    <input type="text" id="lastName" x-model="patientInfo.lastName"
                           class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                </div>
            </div>
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" id="email" x-model="patientInfo.email"
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
            <div>
                <label for="phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
                <input type="tel" id="phone" x-model="patientInfo.phone"
                       class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
        </div>
    </div>

    <!-- Step 2: Referral Information -->
    <div x-show="step === 2">
        <h3 class="text-lg font-medium text-gray-900 mb-6">Referral Information</h3>
        <div class="space-y-4">
            <div>
                <label for="category" class="block text-sm font-medium text-gray-700">Referral Category</label>
                <select id="category" x-model="referralInfo.category"
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
                    <option value="">Select a category</option>
                    <option value="physical_therapy">Physical Therapy</option>
                    <option value="sports">Sports Performance</option>
                    <option value="rehabilitation">Rehabilitation</option>
                    <option value="wellness">General Wellness</option>
                </select>
            </div>
            <div>
                <label for="reason" class="block text-sm font-medium text-gray-700">Reason for Visit</label>
                <textarea id="reason" x-model="referralInfo.reason" rows="4"
                          class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm"></textarea>
            </div>
        </div>
    </div>

    <!-- Step 3: Confirmation -->
    <div x-show="step === 3">
        <h3 class="text-lg font-medium text-gray-900 mb-6">Confirm Your Appointment</h3>
        <div class="bg-gray-50 p-4 rounded-md space-y-4">
            <div>
                <h4 class="text-sm font-medium text-gray-500">Patient Information</h4>
                <p class="mt-1 text-sm text-gray-900" x-text="patientInfo.firstName + ' ' + patientInfo.lastName"></p>
                <p class="text-sm text-gray-600" x-text="patientInfo.email"></p>
                <p class="text-sm text-gray-600" x-text="patientInfo.phone"></p>
            </div>
            <div>
                <h4 class="text-sm font-medium text-gray-500">Referral Details</h4>
                <p class="mt-1 text-sm text-gray-900" x-text="referralInfo.category"></p>
                <p class="text-sm text-gray-600" x-text="referralInfo.reason"></p>
            </div>
            <div>
                <h4 class="text-sm font-medium text-gray-500">Selected Time Slot</h4>
                <p class="mt-1 text-sm text-gray-900">Thursday, March 14, 2024</p>
                <p class="text-sm text-gray-600">10:00 AM - 11:00 AM</p>
            </div>
        </div>
    </div>

    <!-- Navigation Buttons -->
    <div class="mt-8 flex justify-between">
        <button x-show="step > 1" @click="step--"
                class="inline-flex items-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Previous
        </button>
        <button x-show="step < 3" @click="step++"
                class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Next
        </button>
        <button x-show="step === 3" @click="submitBooking()"
                class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Confirm Booking
        </button>
    </div>
</div>
