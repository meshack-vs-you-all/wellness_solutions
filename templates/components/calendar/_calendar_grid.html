{% load static %}

<div class="calendar-widget" 
     x-data="{ 
        currentWeek: new Date(),
        timeSlots: [],
        selectedDate: null,
        selectedSlot: null,
        fetchTimeSlots() {
            // Fetch time slots for the current week
            const startOfWeek = this.getStartOfWeek(this.currentWeek);
            const endOfWeek = this.getEndOfWeek(this.currentWeek);
            // TODO: Add actual API call to fetch slots
        },
        getStartOfWeek(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        },
        getEndOfWeek(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + 7;
            return new Date(d.setDate(diff));
        }
     }"
     x-init="fetchTimeSlots()">

    <!-- Calendar Header -->
    <div class="flex items-center justify-between mb-4">
        <div class="flex items-center space-x-4">
            <h3 class="text-lg font-semibold text-gray-900">Schedule</h3>
            <span class="text-sm text-gray-500" x-text="new Date(currentWeek).toLocaleDateString('en-US', { month: 'long', year: 'numeric' })"></span>
        </div>
        <div class="flex items-center space-x-2">
            <button @click="currentWeek = new Date(currentWeek.setDate(currentWeek.getDate() - 7)); fetchTimeSlots()"
                    class="p-2 text-gray-500 hover:text-gray-700">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <button @click="currentWeek = new Date(); fetchTimeSlots()"
                    class="px-3 py-1 text-sm text-gray-600 hover:text-gray-800 border rounded-md">
                Today
            </button>
            <button @click="currentWeek = new Date(currentWeek.setDate(currentWeek.getDate() + 7)); fetchTimeSlots()"
                    class="p-2 text-gray-500 hover:text-gray-700">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Calendar Grid -->
    <div class="bg-white rounded-lg shadow">
        <!-- Days Header -->
        <div class="grid grid-cols-7 gap-px bg-gray-200 text-sm text-gray-600">
            <template x-for="(day, index) in ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun']" :key="index">
                <div class="py-2 text-center font-medium" x-text="day"></div>
            </template>
        </div>

        <!-- Time Slots Grid -->
        <div class="grid grid-cols-7 gap-px bg-gray-200">
            <template x-for="hour in Array.from({length: 12}, (_, i) => i + 8)" :key="hour">
                <template x-for="day in Array.from({length: 7}, (_, i) => i)" :key="day">
                    <div class="bg-white p-2 h-16 relative"
                         :class="{
                             'bg-blue-50': hasAvailableSlot(hour, day),
                             'bg-pink-50': hasBookedSlot(hour, day)
                         }">
                        <div class="text-xs text-gray-500" x-text="formatTime(hour)"></div>
                        <template x-if="hasSlot(hour, day)">
                            <div class="absolute inset-0 flex items-center justify-center">
                                <div class="w-full h-full flex items-center justify-center cursor-pointer hover:bg-gray-50"
                                     @click="selectSlot(hour, day)">
                                    <span class="text-xs" x-text="getSlotInfo(hour, day)"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </template>
        </div>
    </div>
</div>
