<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}{% endblock title %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 0.9em;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4F46E5;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin: 10px 0;
        }
        .button:hover {
            background-color: #4338CA;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="{% block logo_url %}{% endblock %}" alt="Wellness Solutions" style="max-width: 200px;">
        </div>
        
        {% block content %}{% endblock content %}
        
        <div class="footer">
            <p>© {% now "Y" %} Wellness Solutions. All rights reserved.</p>
            {% block footer %}{% endblock footer %}
        </div>
    </div>
</body>
</html>
