name: Pre-Deploy Verification

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm exec tsc --noEmit

      - name: Build frontend for WordPress
        run: npm run build:wordpress

      - name: Verify theme manifest output
        working-directory: .
        run: test -f ./wordpress/wp-content/themes/wellness-solutions/assets/app/.vite/manifest.json

  theme-php-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint theme PHP files
        run: |
          find ./wordpress/wp-content/themes/wellness-solutions -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Verify required theme files exist
        run: |
          test -f ./wordpress/wp-content/themes/wellness-solutions/style.css
          test -f ./wordpress/wp-content/themes/wellness-solutions/functions.php
          test -f ./wordpress/wp-content/themes/wellness-solutions/front-page.php
