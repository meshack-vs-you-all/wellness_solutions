name: Pre-Deploy Verification

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jpf_stretch_hub_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:6
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/local.txt

      - name: Set up environment
        run: |
          export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/jpf_stretch_hub_test"
          export DJANGO_SETTINGS_MODULE=config.settings.test
          export REDIS_URL="redis://localhost:6379/0"

      - name: Run Django system checks
        run: |
          export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/jpf_stretch_hub_test"
          export DJANGO_SETTINGS_MODULE=config.settings.test
          python manage.py check --deploy

      - name: Check migrations
        run: |
          export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/jpf_stretch_hub_test"
          export DJANGO_SETTINGS_MODULE=config.settings.test
          python manage.py makemigrations --check

      - name: Run migrations
        run: |
          export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/jpf_stretch_hub_test"
          export DJANGO_SETTINGS_MODULE=config.settings.test
          python manage.py migrate

      - name: Run Ruff linting
        run: |
          ruff check . --exclude=.venv_test,venv,node_modules

      - name: Run mypy type checking
        run: |
          export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/jpf_stretch_hub_test"
          export DJANGO_SETTINGS_MODULE=config.settings.test
          mypy . --config-file pyproject.toml || true

      - name: Run tests with coverage
        run: |
          export DATABASE_URL="postgresql://postgres:postgres@localhost:5432/jpf_stretch_hub_test"
          export DJANGO_SETTINGS_MODULE=config.settings.test
          pytest --cov=. --cov-report=xml --cov-report=term --cov-fail-under=80 --maxfail=5

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: backend
          name: backend-coverage

  frontend-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        working-directory: ./frontend
        run: pnpm install

      - name: Run TypeScript check
        working-directory: ./frontend
        run: pnpm exec tsc --noEmit

      - name: Build frontend
        working-directory: ./frontend
        run: pnpm build

      - name: Run tests (if configured)
        working-directory: ./frontend
        run: pnpm test --coverage || echo "No tests configured"

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: bandit -r . -x .venv_test,venv,node_modules || true

      - name: Check for secrets
        run: |
          if grep -r "SECRET_KEY\|password\|api_key" --include="*.py" . | grep -v "settings\|test\|factory\|migration"; then
            echo "Potential secrets found in code"
            exit 1
          fi

