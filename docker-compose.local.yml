version: "3.9"

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
      args:
        - USERID=1000
        - GROUPID=1000
    image: wellness_solutions_local_django
    volumes:
      - .:/app:z,delegated  # Mount entire project for development
      - local_django_media:/app/wellness_solutions/media
    depends_on:
      - postgres
      - redis
      - mailpit
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - "8000:8000"  # Django development server
    command: /start
    user: devuser

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: wellness_solutions_local_postgres
    volumes:
      - local_postgres_data:/var/lib/postgresql/data
      - local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres
    ports:
      - "5432:5432"  # Expose postgres for local development

  redis:
    image: docker.io/redis:6
    volumes:
      - local_redis_data:/data
    ports:
      - "6379:6379"  # Expose redis for local development

  celeryworker:
    <<: *django
    image: wellness_solutions_local_celeryworker
    command: /start-celeryworker
    ports: []

  celerybeat:
    <<: *django
    image: wellness_solutions_local_celerybeat
    command: /start-celerybeat
    ports: []

  flower:
    <<: *django
    image: wellness_solutions_local_flower
    command: /start-flower
    ports:
      - "5555:5555"  # Flower monitoring interface

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"  # Web interface
      - "1025:1025"  # SMTP server

volumes:
  local_postgres_data: {}
  local_postgres_data_backups: {}
  local_django_media: {}
  local_redis_data: {}